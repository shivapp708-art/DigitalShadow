name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: mydigitalshadow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivani-sf/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, zip
      - name: Install dependencies
        run: cd backend/laravel && composer install
      - name: Run tests
        run: cd backend/laravel && php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PASSWORD: test_password

  fastapi-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd backend/fastapi && pip install -r requirements.txt
      - name: Run tests
        run: cd backend/fastapi && pytest app/tests/ -v

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
