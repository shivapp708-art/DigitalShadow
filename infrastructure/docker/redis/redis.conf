bind 0.0.0.0
port 6379
protected-mode no
timeout 300
tcp-keepalive 300
daemonize no
loglevel notice
databases 16

save 900 1
save 300 10
save 60 10000
rdbcompression yes
dbfilename dump.rdb
dir /data

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

maxmemory 512mb
maxmemory-policy allkeys-lru

rename-command FLUSHDB ""
rename-command FLUSHALL ""
