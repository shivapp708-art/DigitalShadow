upstream laravel { server laravel:9000; }
upstream fastapi { server fastapi:8000; }

server {
    listen 80;
    server_name mydigitalshadow.in www.mydigitalshadow.in api.mydigitalshadow.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mydigitalshadow.in www.mydigitalshadow.in;

    ssl_certificate     /etc/letsencrypt/live/mydigitalshadow.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mydigitalshadow.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl http2;
    server_name api.mydigitalshadow.in;

    ssl_certificate     /etc/letsencrypt/live/mydigitalshadow.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mydigitalshadow.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    client_max_body_size 10M;

    location /api/v1/ {
        root /var/www/html/public;
        fastcgi_pass laravel;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }

    location /osint/ {
        proxy_pass http://fastapi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120;
    }

    location /health { proxy_pass http://fastapi/health; }
}
